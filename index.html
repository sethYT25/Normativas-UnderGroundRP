<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Documentos PDF</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Google Sans', Arial, sans-serif;
      background: #f8f9fa;
      color: #202124;
    }

    header {
      background: #fff;
      border-bottom: 1px solid #dadce0;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header img {
      height: 32px;
    }

    header h1 {
      font-size: 20px;
      font-weight: 400;
      color: #5f6368;
    }

    .container {
      max-width: 960px;
      margin: 32px auto;
      padding: 0 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
    }

    .card {
      background: #fff;
      border: 1px solid #dadce0;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      transition: box-shadow 0.2s;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
    }

    .card:hover {
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    .card-thumb {
      background: #f1f3f4;
      height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-thumb svg {
      width: 56px;
      height: 56px;
    }

    .card-info {
      padding: 12px;
      border-top: 1px solid #dadce0;
    }

    .card-info p {
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-info span {
      font-size: 11px;
      color: #5f6368;
    }
  </style>
</head>
<body>

<header>
  <!-- Puedes reemplazar esto con tu logo -->
  <svg xmlns="http://www.w3.org/2000/svg" height="32" viewBox="0 0 24 24" fill="#4285F4">
    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm-1 1.5L18.5 9H13V3.5zM6 20V4h5v7h7v9H6z"/>
  </svg>
  <h1>Mis Documentos</h1>
</header>

<div class="container">
  <div class="grid" id="grid"></div>
</div>

<script>
  // ✏️ Agrega aquí tus PDFs: { name, id }
  // El "id" es el ID del archivo en Google Drive
  // Ejemplo de URL: https://drive.google.com/file/d/ESTE_ES_EL_ID/view
  const pdfs = [
    { name: "Normativas LSPD", id: "1AvPCmWbni-hOpbO1oAxXkoiCjsU-wO9v" },
    { name: "Normativas EMS", id: "1uQzFnQSnU5SrtUcWgBAekbIwdmz9O-mA" },
  ];

  const grid = document.getElementById("grid");

  pdfs.forEach(pdf => {
    const a = document.createElement("a");
    a.className = "card";
    a.href = `https://drive.google.com/file/d/${pdf.id}/preview`;
    a.target = "_blank";
    a.rel = "noopener noreferrer";

    a.innerHTML = `
      <div class="card-thumb">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
          <path fill="#F44336" d="M38 44H10a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h20l10 10v28a2 2 0 0 1-2 2z"/>
          <path fill="#FF8A80" d="M30 4l10 10H30z"/>
          <path fill="#fff" d="M15 22h18v2H15zm0 4h18v2H15zm0 4h12v2H15z"/>
        </svg>
      </div>
      <div class="card-info">
        <p>${pdf.name}</p>
        <span>PDF · Google Drive</span>
      </div>
    `;

    grid.appendChild(a);
  });
</script>

</body>
</html>
